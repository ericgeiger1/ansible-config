---
- name: Deploy Ultimate Cyber-Dev Environment
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: Install System Dependencies
      dnf:
        name:
          - git
          - make
          - gcc
          - gcc-c++
          - clang
          - nodejs
          - unzip
          - wget
          - ripgrep
          - fd-find
          - fuse
        state: present

    - name: Install Tree-sitter CLI
      shell: npm install -g tree-sitter-cli
      args:
        creates: /usr/local/bin/tree-sitter

    - name: Download Neovim Nightly
      get_url:
        url: https://github.com/neovim/neovim/releases/download/nightly/nvim-linux-x86_64.appimage
        dest: /usr/bin/nvim
        mode: '0755'
        force: yes

    - name: Ensure Config Directory Exists
      file:
        path: "/home/cloud-user/.config/nvim"
        state: directory
        owner: cloud-user
        group: cloud-user
        mode: '0755'

    - name: Deploy init.lua Configuration
      copy:
        src: "/home/cloud-user/ansible-config/init.lua"
        dest: "/home/cloud-user/.config/nvim/init.lua"
        owner: cloud-user
        group: cloud-user
        mode: '0644'

    - name: Install win32yank for WSL Clipboard
      get_url:
        url: https://github.com/equalsraf/win32yank/releases/download/v0.1.1/win32yank-x64.zip
        dest: /tmp/win32yank.zip

    - name: Unzip and Install win32yank
      shell: |
        unzip -o /tmp/win32yank.zip -d /tmp/win32yank_tmp
        chmod +x /tmp/win32yank_tmp/win32yank.exe
        mv /tmp/win32yank_tmp/win32yank.exe /usr/local/bin/
      args:
        creates: /usr/local/bin/win32yank.exe
