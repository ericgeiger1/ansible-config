---
- name: Deploy Ultimate Cyber-Dev Environment
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: Install System Dependencies
      dnf:
        name:
          - git
          - make
          - gcc
          - gcc-c++
          - clang
          - nodejs
          - unzip
          - wget
          - ripgrep
          - fd-find
          - fuse
          - socat
        state: present

    - name: Install Tree-sitter CLI
      shell: npm install -g tree-sitter-cli
      args:
        creates: /usr/local/bin/tree-sitter

    - name: Download Neovim Nightly
      get_url:
        url: https://github.com/neovim/neovim/releases/download/nightly/nvim-linux-x86_64.appimage
        dest: /usr/bin/nvim
        mode: '0755'
        force: yes

    - name: Ensure Directories Exist
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user_id }}" 
        group: "{{ ansible_user_id }}"
        mode: '0755'
      loop:
        - "/home/{{ ansible_user_id }}/.config"
        - "/home/{{ ansible_user_id }}/.config/nvim"
        - "/home/{{ ansible_user_id }}/.1password"

    - name: Deploy init.lua (As Symlink for GitHub Sync)
      file:
        src: "/home/{{ ansible_user_id }}/ansible-config/init.lua"
        dest: "/home/{{ ansible_user_id }}/.config/nvim/init.lua"
        state: link
        force: yes
        follow: no

    - name: Deploy lazy-lock.json (As Symlink)
      file:
        src: "/home/{{ ansible_user_id }}/ansible-config/lazy-lock.json"
        dest: "/home/{{ ansible_user_id }}/.config/nvim/lazy-lock.json"
        state: link
        force: yes
        follow: no

    - name: Download win32yank for WSL Clipboard
      get_url:
        url: https://github.com/equalsraf/win32yank/releases/download/v0.1.1/win32yank-x64.zip
        dest: /tmp/win32yank.zip

    - name: Unzip and Install win32yank
      shell: |
        unzip -o /tmp/win32yank.zip -d /tmp/win32yank_tmp
        chmod +x /tmp/win32yank_tmp/win32yank.exe
        mv /tmp/win32yank_tmp/win32yank.exe /usr/local/bin/
      args:
        creates: /usr/local/bin/win32yank.exe

    - name: Download npiperelay for 1Password Bridge
      get_url:
        url: https://github.com/jstarks/npiperelay/releases/download/v0.1.0/npiperelay_windows_amd64.zip
        dest: /tmp/npiperelay.zip

    - name: Unzip and Install npiperelay
      shell: |
        unzip -o /tmp/npiperelay.zip npiperelay.exe -d /tmp/npiperelay_tmp
        chmod +x /tmp/npiperelay_tmp/npiperelay.exe
        mv /tmp/npiperelay_tmp/npiperelay.exe /usr/local/bin/
      args:
        creates: /usr/local/bin/npiperelay.exe

    - name: Install Go Compiler (Required for gopls)
      become: yes
      dnf:
        name: golang
        state: present



